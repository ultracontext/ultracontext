name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/ultracontext dist/package/ultracontext
          cp -R skills dist/package/skills
          chmod 0755 dist/package/ultracontext
          tar -czf dist/ultracontext-${{ matrix.target }}.tar.gz -C dist/package ultracontext skills

      - uses: actions/upload-artifact@v4
        with:
          name: ultracontext-${{ matrix.target }}
          path: dist/ultracontext-${{ matrix.target }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            install.sh
